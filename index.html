<style>
/* ============================================================
   KD DESIGN — feuille de style autonome (aucune dépendance
   Internet). Palette lumineuse rouge / or / jaune / blanc.
   ============================================================ */
:root{
  --ink:40,24,18;         /* fond brun chaud clarifié (plus le noir presque pur d'avant) */
  --char:58,34,24;        /* panneaux, plus clairs */
  --gold:255,204,77;      /* or vif */
  --gold-light:255,230,168;
  --amber:255,183,46;
  --crimson:235,64,73;    /* rouge vif */
  --crimson-light:255,138,132;
  --bone:255,252,247;     /* blanc quasi pur */
  --green:74,222,128;
}
*{box-sizing:border-box;}
html{scroll-behavior:smooth;}
body{
  margin:0;
  min-height:100vh;
  background-color:rgb(var(--ink));
  background-image:
    radial-gradient(ellipse 90% 60% at 50% -10%, rgba(var(--crimson),0.30), transparent 60%),
    radial-gradient(ellipse 70% 50% at 95% 5%, rgba(var(--gold),0.30), transparent 60%),
    radial-gradient(ellipse 70% 50% at 5% 95%, rgba(var(--gold),0.18), transparent 60%);
  background-attachment:fixed;
  color:rgb(var(--bone));
  font-family:'Inter',-apple-system,'Segoe UI',Roboto,Arial,sans-serif;
  -webkit-font-smoothing:antialiased;
  overflow-x:hidden;
}
.font-display{font-family:'Sora',-apple-system,'Segoe UI',Roboto,Arial,sans-serif;font-weight:800;letter-spacing:-.01em;}
.font-body{font-family:-apple-system,'Segoe UI',Roboto,Inter,Arial,sans-serif;}
.font-mono{font-family:'Courier New',monospace;}
a{color:inherit;text-decoration:none;}
button{font-family:inherit;}

/* layout */
.flex{display:flex;}
.inline-flex{display:inline-flex;}
.grid{display:grid;}
.flex-col{flex-direction:column;}
.flex-wrap{flex-wrap:wrap;}
.items-center{align-items:center;}
.items-start{align-items:flex-start;}
.items-end{align-items:flex-end;}
.justify-between{justify-content:space-between;}
.justify-center{justify-content:center;}
.text-center{text-align:center;}
.hidden{display:none;}
.sticky{position:sticky;}
.top-0{top:0;}
.z-50{z-index:50;}
.cursor-pointer{cursor:pointer;}
.min-h-screen{min-height:100vh;}
.mt-auto{margin-top:auto;}
.w-full{width:100%;}
.h-full{height:100%;}
.leading-tight{line-height:1.15;}
.tracking-wide{letter-spacing:.02em;}
.tracking-widest{letter-spacing:.15em;}
.uppercase{text-transform:uppercase;}
.line-through{text-decoration:line-through;}
.space-y-1 > * + *{margin-top:.25rem;}
.rounded-lg{border-radius:.6rem;}
.rounded-full{border-radius:999px;}
.border{border-width:1px;border-style:solid;}
.border-2{border-width:2px;border-style:solid;}
.border-t{border-top:1px solid;}
.border-b{border-bottom:1px solid;}

/* gaps */
.gap-2{gap:.5rem;} .gap-3{gap:.75rem;} .gap-4{gap:1rem;}
.gap-5{gap:1.25rem;} .gap-6{gap:1.5rem;} .gap-8{gap:2rem;}

/* spacing */
.p-3{padding:.75rem;} .p-5{padding:1.25rem;} .p-6{padding:1.5rem;} .p-8{padding:2rem;}
.px-2\.5{padding-left:.6rem;padding-right:.6rem;}
.px-3{padding-left:.75rem;padding-right:.75rem;}
.px-4{padding-left:1rem;padding-right:1rem;}
.px-5{padding-left:1.25rem;padding-right:1.25rem;}
.py-1{padding-top:.25rem;padding-bottom:.25rem;}
.py-1\.5{padding-top:.375rem;padding-bottom:.375rem;}
.py-3{padding-top:.75rem;padding-bottom:.75rem;}
.py-10{padding-top:2.5rem;padding-bottom:2.5rem;}
.py-14{padding-top:3.5rem;padding-bottom:3.5rem;}
.py-16{padding-top:4rem;padding-bottom:4rem;}
.py-20{padding-top:5rem;padding-bottom:5rem;}
.pt-16{padding-top:4rem;} .pt-2{padding-top:.5rem;}
.pb-16{padding-bottom:4rem;} .pb-24{padding-bottom:6rem;}
.mt-1{margin-top:.25rem;} .mt-2{margin-top:.5rem;} .mt-3{margin-top:.75rem;}
.mt-5{margin-top:1.25rem;} .mt-6{margin-top:1.5rem;} .mt-8{margin-top:2rem;}
.mt-10{margin-top:2.5rem;}
.mb-8{margin-bottom:2rem;} .mb-10{margin-bottom:2.5rem;}
.m-1\.5{margin:.375rem;}
.mx-auto{margin-left:auto;margin-right:auto;}
.h-24{height:6rem;} .w-20{width:5rem;}

/* max widths */
.max-w-md{max-width:28rem;} .max-w-lg{max-width:32rem;} .max-w-xl{max-width:36rem;}
.max-w-2xl{max-width:42rem;} .max-w-3xl{max-width:48rem;} .max-w-4xl{max-width:56rem;}
.max-w-5xl{max-width:64rem;} .max-w-6xl{max-width:72rem;}

/* type scale */
.text-xs{font-size:.75rem;} .text-sm{font-size:.875rem;}
.text-lg{font-size:1.125rem;} .text-xl{font-size:1.25rem;}
.text-2xl{font-size:1.5rem;} .text-3xl{font-size:1.875rem;}
.text-4xl{font-size:2.25rem;}
.font-bold{font-weight:700;} .font-semibold{font-weight:600;} .font-extrabold{font-weight:800;}

/* colors */
.text-bone{color:rgb(var(--bone));}
.text-gold{color:rgb(var(--gold));}
.text-gold-light{color:rgb(var(--gold-light));}
.text-crimson-light{color:rgb(var(--crimson-light));}
.text-green-400{color:rgb(var(--green));}
.text-transparent{color:transparent;}
.text-bone\/40{color:rgba(var(--bone),.40);} .text-bone\/45{color:rgba(var(--bone),.45);}
.text-bone\/50{color:rgba(var(--bone),.50);} .text-bone\/55{color:rgba(var(--bone),.55);}
.text-bone\/60{color:rgba(var(--bone),.62);} .text-bone\/65{color:rgba(var(--bone),.68);}
.text-bone\/70{color:rgba(var(--bone),.72);} .text-bone\/75{color:rgba(var(--bone),.78);}
.text-bone\/80{color:rgba(var(--bone),.85);}
.bg-ink\/85{background-color:rgba(var(--ink),.9);}
.bg-ink\/40{background-color:rgba(var(--ink),.5);}
.bg-char\/50{background-color:rgba(var(--char),.6);}
.bg-gold\/10{background-color:rgba(var(--gold),.14);}
.bg-crimson\/10{background-color:rgba(var(--crimson),.14);}
.border-gold{border-color:rgb(var(--gold));}
.border-gold\/15{border-color:rgba(var(--gold),.25);}
.border-gold\/20{border-color:rgba(var(--gold),.3);}
.border-gold\/30{border-color:rgba(var(--gold),.4);}
.border-gold\/50{border-color:rgba(var(--gold),.55);}
.border-crimson\/50{border-color:rgba(var(--crimson),.6);}
.border-green-400\/40{border-color:rgba(var(--green),.5);}
.border-bone\/30{border-color:rgba(var(--bone),.3);}
.backdrop-blur-md{-webkit-backdrop-filter:blur(10px);backdrop-filter:blur(10px);}
.shadow-goldglow{box-shadow:0 0 30px rgba(var(--gold),.45);}
.bg-gold-red{background-image:linear-gradient(135deg,rgb(var(--gold)) 0%,rgb(var(--amber)) 40%,rgb(var(--crimson)) 100%);}
.bg-clip-text{
  -webkit-background-clip:text; background-clip:text;
  -webkit-text-fill-color:transparent;
}
.hover\:text-gold:hover{color:rgb(var(--gold));}
.hover\:text-crimson-light:hover{color:rgb(var(--crimson-light));}
.hover\:underline:hover{text-decoration:underline;}

/* grid */
.grid-cols-1{grid-template-columns:repeat(1,minmax(0,1fr));}
.grid-cols-2{grid-template-columns:repeat(2,minmax(0,1fr));}

/* responsive */
@media(min-width:640px){
  .sm\:inline{display:inline;}
  .sm\:grid-cols-2{grid-template-columns:repeat(2,minmax(0,1fr));}
}
@media(min-width:768px){
  .md\:text-6xl{font-size:3.75rem;}
}
@media(min-width:1024px){
  .lg\:grid-cols-3{grid-template-columns:repeat(3,minmax(0,1fr));}
  .lg\:grid-cols-4{grid-template-columns:repeat(4,minmax(0,1fr));}
  .lg\:col-span-4{grid-column:span 4 / span 4;}
}
@media(min-width:768px){
  .md\:grid-cols-2{grid-template-columns:repeat(2,minmax(0,1fr));}
}
.col-span-2{grid-column:span 2 / span 2;}
.col-span-3{grid-column:span 3 / span 3;}
.max-h-96{max-height:24rem;}
.overflow-y-auto{overflow-y:auto;}

/* KD DESIGN signature: cadre à coins dorés lumineux */
.kd-frame{
  position:relative;
  border:1px solid rgba(var(--gold),.4);
  border-radius:.9rem;
  background:linear-gradient(180deg, rgba(var(--char),.88), rgba(var(--ink),.88));
  box-shadow:0 8px 30px rgba(0,0,0,.25), inset 0 1px 0 rgba(255,255,255,.06);
  transition:box-shadow .3s,border-color .3s,transform .3s;
}
.kd-frame:hover{border-color:rgb(var(--gold));box-shadow:0 0 30px rgba(var(--gold),.4);transform:translateY(-3px);}
.kd-frame::before,.kd-frame::after{content:'';position:absolute;width:20px;height:20px;border-color:rgb(var(--gold));opacity:.85;}
.kd-frame::before{top:-1px;left:-1px;border-top:2px solid;border-left:2px solid;}
.kd-frame::after{bottom:-1px;right:-1px;border-bottom:2px solid;border-right:2px solid;}

.kd-btn-primary{
  display:inline-flex;align-items:center;justify-content:center;gap:.5rem;
  border-radius:.6rem;padding:.85rem 1.4rem;font-family:'Sora',sans-serif;font-weight:800;
  color:#20100a;background-image:linear-gradient(135deg,rgb(var(--gold)) 0%,rgb(var(--amber)) 40%,rgb(var(--crimson)) 100%);
  background-size:160% 160%;background-position:left center;
  transition:all .3s;cursor:pointer;border:none;box-shadow:0 4px 20px rgba(var(--gold),.3);
}
.kd-btn-primary:hover{background-position:right center;box-shadow:0 0 30px rgba(var(--gold),.55);}
.kd-btn-primary:disabled{opacity:.6;cursor:default;}
.kd-btn-secondary{
  display:inline-flex;align-items:center;justify-content:center;gap:.5rem;
  border-radius:.6rem;padding:.85rem 1.4rem;font-family:'Sora',sans-serif;font-weight:700;
  border:1.5px solid rgba(var(--gold),.6);color:rgb(var(--gold-light));
  transition:all .3s;cursor:pointer;background:rgba(var(--gold),.06);
}
.kd-btn-secondary:hover{background:rgba(var(--gold),.16);border-color:rgb(var(--gold));}
.kd-input{
  width:100%;border-radius:.6rem;border:1.5px solid rgba(var(--gold),.3);
  background:rgba(var(--ink),.55);padding:.8rem 1rem;color:rgb(var(--bone));outline:none;font-size:.95rem;
}
.kd-input:focus{border-color:rgb(var(--gold));box-shadow:0 0 0 3px rgba(var(--gold),.15);}
.kd-label{display:block;font-size:.875rem;font-weight:600;color:rgb(var(--gold-light));margin-bottom:.4rem;}
::placeholder{color:rgba(var(--bone),.4);}

.service-icon-wrap{
  width:72px;height:72px;border-radius:.9rem;overflow:hidden;
  box-shadow:0 0 18px rgba(var(--gold),.3);
  border:1px solid rgba(var(--gold),.35);
}
.service-icon{width:100%;height:100%;object-fit:cover;display:block;}

.choice-btn{
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:.5rem;
  border-radius:.9rem;padding:1.5rem 1rem;cursor:pointer;text-align:center;
  border:1.5px solid rgba(var(--gold),.35);background:rgba(var(--char),.5);
  transition:all .25s;
}
.choice-btn:hover{border-color:rgb(var(--gold));background:rgba(var(--gold),.1);transform:translateY(-2px);}
.choice-btn .icon{font-size:1.8rem;}

.stat-card{
  border-radius:.8rem;padding:1.2rem;border:1px solid rgba(var(--gold),.25);
  background:linear-gradient(160deg, rgba(var(--char),.8), rgba(var(--ink),.8));
}
.stat-card .num{font-family:'Sora',sans-serif;font-weight:800;font-size:1.8rem;color:rgb(var(--gold-light));}
.stat-card .lbl{font-size:.8rem;color:rgba(var(--bone),.6);margin-top:.2rem;}

.tab-btn{
  border-radius:999px;padding:.5rem 1rem;font-size:.85rem;border:1px solid rgba(var(--gold),.25);
  color:rgba(var(--bone),.6);cursor:pointer;background:transparent;
}
.tab-btn.active{border-color:rgb(var(--gold));background:rgba(var(--gold),.12);color:rgb(var(--gold-light));}

.chat-box{border:1px solid rgba(var(--gold),.2);border-radius:.6rem;padding:.75rem;background:rgba(var(--ink),.4);max-height:220px;overflow-y:auto;}
.chat-msg{border-radius:.6rem;padding:.5rem .75rem;margin-bottom:.5rem;font-size:.85rem;max-width:85%;}
.chat-msg.admin{background:rgba(var(--gold),.15);margin-right:auto;}
.chat-msg.client{background:rgba(var(--crimson),.15);margin-left:auto;text-align:right;}
.chat-msg a{color:rgb(var(--gold-light));text-decoration:underline;}

.field-heading{
  font-family:'Sora',sans-serif;font-weight:700;color:rgb(var(--gold-light));
  margin-top:.5rem;padding-top:.75rem;border-top:1px dashed rgba(var(--gold),.25);
}
.field-hint{font-size:.75rem;color:rgba(var(--bone),.45);margin-top:.25rem;}

.qr-box{width:150px;height:150px;border-radius:.7rem;overflow:hidden;border:2px solid rgba(var(--gold),.5);box-shadow:0 0 20px rgba(var(--gold),.3);}
.qr-box img{width:100%;height:100%;object-fit:cover;}

.admin-row{display:flex;align-items:center;justify-content:space-between;gap:.75rem;border:1px solid rgba(var(--gold),.2);border-radius:.6rem;padding:.75rem;}

/* utility classes used inline via !important-style tailwind overrides */
.\!px-4{padding-left:1rem !important;padding-right:1rem !important;}
.\!py-1\.5{padding-top:.375rem !important;padding-bottom:.375rem !important;}
.\!py-2{padding-top:.5rem !important;padding-bottom:.5rem !important;}
.\!py-2\.5{padding-top:.625rem !important;padding-bottom:.625rem !important;}
.\!w-auto{width:auto !important;}

/* ============================================================
   KD DESIGN PREMIUM — animations, effets visuels, UX avancée
   ============================================================ */

/* --- accessibilité : focus clavier visible --- */
a:focus-visible, button:focus-visible, input:focus-visible, textarea:focus-visible, select:focus-visible{
  outline:2px solid rgb(var(--gold)); outline-offset:2px;
}
.skip-link{
  position:fixed; left:-999px; top:0; z-index:100;
  background:rgb(var(--gold)); color:#20100a; padding:.6rem 1rem; border-radius:0 0 .5rem 0; font-weight:700;
}
.skip-link:focus{left:0;}

/* --- loader de démarrage --- */
#kdLoader{
  position:fixed; inset:0; z-index:200; background:rgb(var(--ink));
  display:flex; align-items:center; justify-content:center; flex-direction:column; gap:1rem;
  transition:opacity .6s ease, visibility .6s ease;
}
#kdLoader.kd-hide{opacity:0; visibility:hidden; pointer-events:none;}
.kd-loader-logo{
  width:60px;height:60px;border:3px solid rgba(var(--gold),.25); border-top-color:rgb(var(--gold));
  border-radius:50%; animation:kd-spin .9s linear infinite;
}
@keyframes kd-spin{to{transform:rotate(360deg);}}
.kd-loader-text{font-family:'Sora',sans-serif;font-weight:800;letter-spacing:.15em;color:rgba(var(--gold-light),.9);font-size:.8rem;text-transform:uppercase;}

/* --- barre de progression de scroll --- */
#kdScrollProgress{
  position:fixed; top:0; left:0; height:3px; width:0%;
  background-image:linear-gradient(90deg, rgb(var(--gold)), rgb(var(--crimson)));
  z-index:60; box-shadow:0 0 10px rgba(var(--gold),.6);
}

/* --- curseur personnalisé (desktop uniquement) --- */
@media(hover:hover) and (pointer:fine){
  body.kd-custom-cursor{cursor:none;}
  body.kd-custom-cursor a, body.kd-custom-cursor button{cursor:none;}
  #kdCursorDot, #kdCursorRing{position:fixed; top:0; left:0; pointer-events:none; z-index:9999; border-radius:50%; transform:translate(-50%,-50%);}
  #kdCursorDot{width:6px;height:6px;background:rgb(var(--gold)); box-shadow:0 0 8px rgba(var(--gold),.8);}
  #kdCursorRing{width:32px;height:32px;border:1.5px solid rgba(var(--gold),.5); transition:width .18s,height .18s,border-color .18s,background .18s;}
  body.kd-cursor-hover #kdCursorRing{width:46px;height:46px;background:rgba(var(--gold),.08);border-color:rgb(var(--gold));}
}
@media(hover:none),(pointer:coarse){
  #kdCursorDot,#kdCursorRing{display:none;}
}

/* --- particules d'arrière-plan --- */
#kdParticles{position:fixed; inset:0; z-index:0; pointer-events:none;}
#app{position:relative; z-index:1;}

/* --- bouton retour en haut --- */
#kdBackToTop{
  position:fixed; bottom:5.5rem; right:1.25rem; z-index:45; width:44px;height:44px;border-radius:999px;
  display:flex;align-items:center;justify-content:center; border:1.5px solid rgba(var(--gold),.5);
  background:rgba(var(--ink),.85); color:rgb(var(--gold-light)); backdrop-filter:blur(8px);
  opacity:0; visibility:hidden; transform:translateY(10px); transition:all .3s; cursor:pointer;
  box-shadow:0 4px 20px rgba(0,0,0,.3); font-size:1.1rem;
}
#kdBackToTop.kd-show{opacity:1;visibility:visible;transform:translateY(0);}
#kdBackToTop:hover{border-color:rgb(var(--gold));box-shadow:0 0 20px rgba(var(--gold),.4);}

/* --- bouton WhatsApp flottant --- */
#kdWhatsappFab{
  position:fixed; bottom:1.25rem; right:1.25rem; z-index:45; width:56px;height:56px;border-radius:999px;
  display:flex;align-items:center;justify-content:center; font-size:1.6rem; text-decoration:none;
  background:linear-gradient(135deg,#25D366,#128C7E); box-shadow:0 6px 24px rgba(37,211,102,.45);
  transition:transform .25s, box-shadow .25s; animation:kd-pulse 2.4s ease-in-out infinite;
}
#kdWhatsappFab:hover{transform:scale(1.08); box-shadow:0 8px 28px rgba(37,211,102,.6);}
@keyframes kd-pulse{0%,100%{box-shadow:0 6px 24px rgba(37,211,102,.45);}50%{box-shadow:0 6px 30px rgba(37,211,102,.7);}}

/* --- navbar glass + actif + burger mobile --- */
header.kd-nav{transition:background-color .3s, box-shadow .3s;}
header.kd-nav.kd-scrolled{background-color:rgba(var(--ink),.94); box-shadow:0 4px 24px rgba(0,0,0,.35);}
.kd-nav-link{position:relative; padding-bottom:2px;}
.kd-nav-link::after{
  content:''; position:absolute; left:0; bottom:-2px; width:0; height:2px;
  background-image:linear-gradient(90deg,rgb(var(--gold)),rgb(var(--crimson))); transition:width .25s;
}
.kd-nav-link:hover::after, .kd-nav-link.kd-active::after{width:100%;}
.kd-nav-link.kd-active{color:rgb(var(--gold-light));}
#kdBurger{display:none; flex-direction:column; gap:4px; cursor:pointer; padding:.4rem;}
#kdBurger span{width:22px;height:2px;background:rgb(var(--bone)); border-radius:2px; transition:all .3s;}
#kdMobileMenu{
  display:none; flex-direction:column; gap:.25rem; padding:0 1.25rem 0;
  border-top:1px solid rgba(var(--gold),.15); background:rgba(var(--ink),.97);
  max-height:0; overflow:hidden; transition:max-height .3s ease, padding .3s ease;
}
#kdMobileMenu.kd-open{display:flex; max-height:260px; padding:.75rem 1.25rem 1rem;}
#kdMobileMenu a, #kdMobileMenu button{padding:.6rem 0; text-align:left;}
@media(max-width:639px){
  #kdBurger{display:flex;}
  .kd-desktop-only{display:none !important;}
}

/* --- boutons premium : ripple + shine + icônes vivantes --- */
.kd-btn-primary, .kd-btn-secondary{position:relative; overflow:hidden;}
.kd-btn-primary::before{
  content:''; position:absolute; inset:0; background:linear-gradient(120deg,transparent 0%,rgba(255,255,255,.35) 45%,transparent 60%);
  transform:translateX(-120%); transition:transform .6s;
}
.kd-btn-primary:hover::before{transform:translateX(120%);}
.kd-btn-primary:active, .kd-btn-secondary:active{transform:scale(.97);}
.kd-ripple{position:absolute; border-radius:50%; background:rgba(255,255,255,.5); transform:scale(0); animation:kd-ripple .6s ease-out forwards; pointer-events:none;}
@keyframes kd-ripple{to{transform:scale(2.6); opacity:0;}}

/* --- hero --- */
.hero-section{position:relative; overflow:hidden;}
.kd-logo-glow{position:relative;}
.kd-logo-glow::before{
  content:''; position:absolute; inset:-45%; z-index:-1; border-radius:50%;
  background:radial-gradient(circle, rgba(var(--gold),.55), rgba(var(--crimson),.25) 45%, transparent 70%);
  filter:blur(18px); animation:kd-glow-pulse 3.5s ease-in-out infinite;
}
@keyframes kd-glow-pulse{0%,100%{opacity:.7;transform:scale(1);}50%{opacity:1;transform:scale(1.12);}}
.kd-shine-text{
  background-image:linear-gradient(100deg, rgba(var(--bone),.8) 30%, rgb(var(--gold-light)) 45%, rgba(var(--bone),.8) 60%);
  background-size:220% 100%; -webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;
  animation:kd-shine 4.5s linear infinite;
}
@keyframes kd-shine{0%{background-position:130% 0;}100%{background-position:-130% 0;}}

/* --- cartes interactives --- */
.kd-frame{will-change:transform;}
.service-icon-wrap{transition:transform .35s;}
.kd-frame:hover .service-icon-wrap{transform:scale(1.08) rotate(-2deg);}

/* --- footer --- */
.kd-footer{border-top:1px solid rgba(var(--gold),.15); background:rgba(var(--ink),.65); padding:2.5rem 1.25rem 2rem;}
.kd-footer-social a{
  display:inline-flex;align-items:center;justify-content:center;width:38px;height:38px;border-radius:999px;
  border:1px solid rgba(var(--gold),.3); transition:all .25s; text-decoration:none;
}
.kd-footer-social a:hover{border-color:rgb(var(--gold)); background:rgba(var(--gold),.12); transform:translateY(-2px);}

/* --- réduction de mouvement (accessibilité) --- */
@media (prefers-reduced-motion: reduce){
  *{animation-duration:.001ms !important; animation-iteration-count:1 !important; transition-duration:.001ms !important;}
}

/* --- responsive fine-tuning --- */
@media(max-width:400px){
  .kd-btn-primary,.kd-btn-secondary{padding:.75rem 1.1rem; font-size:.9rem;}
}

const DEFAULT_PAYMENT_METHODS = [
  { id:'orange_money', name:'Orange Money' },
  { id:'wave', name:'Wave' },
];

const DEFAULT_CONTACTS = [
  { label: 'Téléphone', value: '+226 74 12 80 91', type: 'tel' },
  { label: 'E-mail', value: 'kad66747@gmail.com', type: 'email' },
];

let SERVICES = DEFAULT_SERVICES;
let PAYMENT_METHODS = DEFAULT_PAYMENT_METHODS;
let CONTACTS = DEFAULT_CONTACTS;
let ADMIN_EMAILS = [CONFIG.ADMIN_EMAIL];

const getService = (id) => SERVICES.find(s => s.id === id);
const isOwner = (email) => email === CONFIG.ADMIN_EMAIL;

// ============================================================
// SUPABASE
// ============================================================
const sb = (CONFIG.SUPABASE_URL.startsWith('http'))
  ? supabase.createClient(CONFIG.SUPABASE_URL, CONFIG.SUPABASE_ANON_KEY)
  : null;

let currentUser = null;
let isAdmin = false;

async function refreshUser() {
  if (!sb) { currentUser = null; isAdmin = false; return; }
  const { data } = await sb.auth.getSession();
  currentUser = data.session?.user || null;
  isAdmin = currentUser ? ADMIN_EMAILS.includes(currentUser.email) : false;
}

async function loadDynamicData() {
  if (!sb) return;
  try {
    const { data: svc } = await sb.from('services').select('*').order('sort_order', { ascending: true });
    if (svc && svc.length) SERVICES = svc.map(s => ({ ...s, starting_at: s.starting_at }));
  } catch (e) {}
  try {
    const { data: pm } = await sb.from('payment_methods').select('*').eq('active', true);
    if (pm && pm.length) PAYMENT_METHODS = pm;
  } catch (e) {}
  try {
    const { data: ct } = await sb.from('contact_methods').select('*');
    if (ct && ct.length) CONTACTS = ct;
  } catch (e) {}
  try {
    const { data: ad } = await sb.from('admins').select('email');
    if (ad) ADMIN_EMAILS = [CONFIG.ADMIN_EMAIL, ...ad.map(a => a.email)];
  } catch (e) {}
}

function trackVisit() {
  if (!sb) return;
  sb.from('site_visits').insert({ path: location.hash || '#/' }).then(() => {}).catch(() => {});
}

// ============================================================
// ROUTER
// ============================================================
window.addEventListener('hashchange', render);
window.addEventListener('DOMContentLoaded', async () => {
  await refreshUser();
  await loadDynamicData();
  if (currentUser) isAdmin = ADMIN_EMAILS.includes(currentUser.email);
  if (sb) sb.auth.onAuthStateChange((_e, session) => {
    currentUser = session?.user || null;
    isAdmin = currentUser ? ADMIN_EMAILS.includes(currentUser.email) : false;
    render();
  });
  trackVisit();
  render();
});

function esc(str) { const d = document.createElement('div'); d.innerText = str ?? ''; return d.innerHTML; }

async function render() {
  const app = document.getElementById('app');
  const hash = location.hash || '#/';
  const [_, route, param] = hash.split('/');

  app.innerHTML = navbarHTML();
  attachNavbarEvents();

  const main = document.createElement('div');
  main.id = 'main';
  app.appendChild(main);
  app.insertAdjacentHTML('beforeend', kdFooterHTML());

  if (!sb) {
    main.innerHTML = `<div class="max-w-lg mx-auto px-5 py-16 text-center kd-frame p-8 mt-10">
      <p class="text-crimson-light font-semibold">⚠️ Supabase non configuré</p>
      <p class="text-bone/60 text-sm mt-2">Ouvre ce fichier HTML dans un éditeur de texte et remplis SUPABASE_URL et SUPABASE_ANON_KEY tout en haut du fichier (section CONFIG). Le catalogue s'affiche quand même ci-dessous à titre d'aperçu.</p>
    </div>`;
  }

  if (route === '' || route === undefined) return renderHome(main);
  if (route === 'connexion') return renderLogin(main);
  if (route === 'inscription') return renderSignup(main);
  if (route === 'commande') return renderOrderForm(main, param);
  if (route === 'tableau-de-bord') return renderDashboard(main);
  if (route === 'admin') return renderAdmin(main);
  return renderHome(main);
}

      ${currentUser ? `
        <a href="#/${isAdmin ? 'admin' : 'tableau-de-bord'}" class="${isAccount ? 'text-gold' : 'text-bone/80'}">${isAdmin ? 'Admin' : 'Mes commandes'}</a>

function attachNavbarEvents() {
  const btn = document.getElementById('logoutBtn');
  if (btn) btn.onclick = async () => { await sb.auth.signOut(); location.hash = '#/'; };
  const btnM = document.getElementById('logoutBtnMobile');
  if (btnM) btnM.onclick = async () => { await sb.auth.signOut(); location.hash = '#/'; };

  const burger = document.getElementById('kdBurger');
  const menu = document.getElementById('kdMobileMenu');
  if (burger && menu) {
    const toggle = () => menu.classList.toggle('kd-open');
    burger.onclick = toggle;
    burger.onkeydown = (e) => { if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); toggle(); } };
    menu.querySelectorAll('a, button').forEach(el => el.addEventListener('click', () => menu.classList.remove('kd-open')));
  }

  const header = document.querySelector('header.kd-nav');
  if (header) header.classList.toggle('kd-scrolled', (window.scrollY || 0) > 10);
}

  const { data: messages } = await sb.from('order_messages').select('*').eq('order_id', orderId).order('created_at', { ascending: true });

  container.innerHTML = messages.map(m => `
    <div class="chat-msg ${m.sender}">
      ${m.message ? esc(m.message) : ''}

    </div>`).join('');

}

// ---------- PARTAGE DU SITE (lien + logo) ----------
async function shareSite() {
  const url = window.location.origin + window.location.pathname;
  const text = 'Découvrez KD DESIGN — logos, affiches, montage vidéo, sites web et plus encore, à des prix pensés pour les entrepreneurs d\'ici.';
  try {
    if (navigator.canShare && typeof KD_LOGO_IMAGE !== 'undefined') {
      const res = await fetch(KD_LOGO_IMAGE);
      const blob = await res.blob();
      const file = new File([blob], 'kd-design-logo.jpg', { type: blob.type || 'image/jpeg' });
      if (navigator.canShare({ files: [file] })) {
        await navigator.share({ files: [file], title: 'KD DESIGN', text: `${text}\n${url}` });
        return;
      }
    }
    if (navigator.share) {
      await navigator.share({ title: 'KD DESIGN', text, url });
      return;
    }
    await navigator.clipboard.writeText(`${text}\n${url}`);
    alert('Lien et présentation copiés dans le presse-papiers !');
  } catch (e) {
    if (e && e.name !== 'AbortError') {
      try { await navigator.clipboard.writeText(`${text}\n${url}`); alert('Lien copié dans le presse-papiers !'); } catch (_) {}
    }
  }
}

let salesChartInstance = null;
function drawSalesChart(orders) {
  const canvas = document.getElementById('salesChart');
  if (!canvas || typeof Chart === 'undefined') return;
  const days = 30;
  const labels = [];
  const countsByDay = {};
  const salesByDay = {};
  const now = new Date();
  for (let i = days - 1; i >= 0; i--) {
    const d = new Date(now); d.setDate(now.getDate() - i);
    const key = d.toISOString().slice(0, 10);
    labels.push(d.toLocaleDateString('fr-FR', { day: '2-digit', month: '2-digit' }));
    countsByDay[key] = 0; salesByDay[key] = 0;
  }
  (orders || []).forEach(o => {
    const key = (o.created_at || '').slice(0, 10);
    if (key in countsByDay) {
      countsByDay[key] += 1;
      if (o.status !== 'annulee') salesByDay[key] += Number(o.price || 0);
    }
  });
  const countsData = Object.values(countsByDay);
  const salesData = Object.values(salesByDay);

  if (salesChartInstance) salesChartInstance.destroy();
  salesChartInstance = new Chart(canvas, {
    data: {
      labels,
      datasets: [
        { type: 'bar', label: 'Commandes', data: countsData, backgroundColor: 'rgba(212,175,55,0.55)', yAxisID: 'y' },
        { type: 'line', label: 'Ventes (FCFA)', data: salesData, borderColor: '#e0483a', backgroundColor: 'rgba(224,72,58,0.15)', yAxisID: 'y1', tension: 0.3 }
      ]
    },
    options: {
      responsive: true,
      interaction: { mode: 'index', intersect: false },
      scales: {
        y: { beginAtZero: true, position: 'left', ticks: { color: '#e8dfce' }, grid: { color: 'rgba(255,255,255,.06)' }, title: { display: true, text: 'Commandes', color: '#e8dfce' } },
        y1: { beginAtZero: true, position: 'right', grid: { drawOnChartArea: false }, ticks: { color: '#e8dfce' }, title: { display: true, text: 'FCFA', color: '#e8dfce' } },
        x: { ticks: { color: '#e8dfce', maxRotation: 0, autoSkip: true, maxTicksLimit: 10 }, grid: { display: false } }
      },
      plugins: { legend: { labels: { color: '#e8dfce' } } }
    }
  });
}

<!-- ============================================================
     KD DESIGN PREMIUM — UX, animations et effets visuels globaux
     (n'interfère avec aucune fonctionnalité Supabase ci-dessus)

<script>
// ---------- Loader de démarrage ----------
window.addEventListener('load', () => {
  const loader = document.getElementById('kdLoader');
  setTimeout(() => loader && loader.classList.add('kd-hide'), 350);
});

// ---------- Bouton WhatsApp flottant (numéro depuis CONFIG) ----------
const kdFab = document.getElementById('kdWhatsappFab');
if (kdFab && typeof CONFIG !== 'undefined') kdFab.href = `https://wa.me/${CONFIG.WHATSAPP_NUMBER}`;

// ---------- Barre de progression du scroll + navbar au scroll + retour en haut ----------
const kdProgress = document.getElementById('kdScrollProgress');
const kdBackToTop = document.getElementById('kdBackToTop');
function kdOnScroll() {
  const h = document.documentElement;
  const max = h.scrollHeight - h.clientHeight;
  const pct = max > 0 ? (h.scrollTop / max) * 100 : 0;
  if (kdProgress) kdProgress.style.width = pct + '%';
  const y = window.scrollY || h.scrollTop;
  if (kdBackToTop) kdBackToTop.classList.toggle('kd-show', y > 400);
  const header = document.querySelector('header.kd-nav');
  if (header) header.classList.toggle('kd-scrolled', y > 10);
}
window.addEventListener('scroll', kdOnScroll, { passive: true });
if (kdBackToTop) kdBackToTop.onclick = () => window.scrollTo({ top: 0, behavior: 'smooth' });

// ---------- Curseur personnalisé (desktop uniquement) ----------
const kdDot = document.getElementById('kdCursorDot');
const kdRing = document.getElementById('kdCursorRing');
if (kdDot && kdRing && window.matchMedia('(hover:hover) and (pointer:fine)').matches) {
  document.body.classList.add('kd-custom-cursor');
  let mx = -100, my = -100, rx = -100, ry = -100;
  window.addEventListener('mousemove', (e) => {
    mx = e.clientX; my = e.clientY;
    kdDot.style.left = mx + 'px'; kdDot.style.top = my + 'px';
    const hovered = e.target.closest('a, button, .kd-frame, .choice-btn');
    document.body.classList.toggle('kd-cursor-hover', !!hovered);
  });
  (function kdCursorLoop() {
    rx += (mx - rx) * 0.18; ry += (my - ry) * 0.18;
    kdRing.style.left = rx + 'px'; kdRing.style.top = ry + 'px';
    requestAnimationFrame(kdCursorLoop);
  })();
}

// ---------- Particules lumineuses d'arrière-plan (rouge & or) ----------
(function kdParticlesInit() {
  const canvas = document.getElementById('kdParticles');
  if (!canvas || !canvas.getContext) return;
  const reduceMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
  const ctx = canvas.getContext('2d');
  const COLORS = ['rgba(255,204,77,', 'rgba(235,64,73,', 'rgba(255,230,168,'];
  let w, h, particles = [];
  function resize() { w = canvas.width = window.innerWidth; h = canvas.height = window.innerHeight; }
  function makeParticles() {
    const count = Math.min(55, Math.floor((w * h) / 24000));
    particles = Array.from({ length: count }, () => ({
      x: Math.random() * w, y: Math.random() * h,
      r: Math.random() * 1.8 + 0.6,
      vx: (Math.random() - 0.5) * 0.15, vy: (Math.random() - 0.5) * 0.15,
      c: COLORS[Math.floor(Math.random() * COLORS.length)],
      a: Math.random() * 0.5 + 0.2,
    }));
  }
  function tick() {
    ctx.clearRect(0, 0, w, h);
    particles.forEach(p => {
      p.x += p.vx; p.y += p.vy;
      if (p.x < 0) p.x = w; if (p.x > w) p.x = 0;
      if (p.y < 0) p.y = h; if (p.y > h) p.y = 0;
      ctx.beginPath();
      ctx.fillStyle = p.c + p.a + ')';
      ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
      ctx.fill();
    });
    requestAnimationFrame(tick);
  }
  resize(); makeParticles();
  window.addEventListener('resize', () => { resize(); makeParticles(); });
  if (!reduceMotion) tick();
})();

// ---------- Effet ripple sur tous les boutons premium ----------
document.addEventListener('click', (e) => {
  const btn = e.target.closest('.kd-btn-primary, .kd-btn-secondary');
  if (!btn) return;
  const rect = btn.getBoundingClientRect();
  const size = Math.max(rect.width, rect.height);
  const ripple = document.createElement('span');
  ripple.className = 'kd-ripple';
  ripple.style.width = ripple.style.height = size + 'px';
  ripple.style.left = (e.clientX - rect.left - size / 2) + 'px';
  ripple.style.top = (e.clientY - rect.top - size / 2) + 'px';
  btn.appendChild(ripple);
  setTimeout(() => ripple.remove(), 650);
});

// ---------- Compteurs animés (statistiques admin) ----------
function kdAnimateCounters(root) {
  root.querySelectorAll('.stat-card .num:not([data-kd-counted])').forEach(el => {
    const target = parseInt(el.textContent.replace(/\D/g, ''), 10);
    if (isNaN(target)) return;
    el.setAttribute('data-kd-counted', '1');
    const duration = 900, t0 = performance.now();
    function step(t) {
      const p = Math.min((t - t0) / duration, 1);
      el.textContent = Math.floor(target * p);
      if (p < 1) requestAnimationFrame(step); else el.textContent = target;
    }
    requestAnimationFrame(step);
  });
}

// ---------- Réapparition au scroll (AOS) : re-scan après chaque rendu dynamique ----------
if (window.AOS) AOS.init({ duration: 700, once: true, offset: 30 });
let kdRefreshTimer = null;
const kdAppEl = document.getElementById('app');
if (kdAppEl) {
  const kdObserver = new MutationObserver(() => {
    clearTimeout(kdRefreshTimer);
    kdRefreshTimer = setTimeout(() => {
      if (window.AOS) AOS.refreshHard();
      kdAnimateCounters(kdAppEl);
    }, 150);
  });
  kdObserver.observe(kdAppEl, { childList: true, subtree: true });
}
</script>
